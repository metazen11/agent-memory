name: agent-memory

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agent-memory-db
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentmem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-agent_memory}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - agent_memory_pgdata:/var/lib/postgresql/data
      - ../scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentmem} -d ${POSTGRES_DB:-agent_memory}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  agent_memory_pgdata:
