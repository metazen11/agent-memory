name: agent-memory

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agent-memory-db
    environment:
      POSTGRES_USER: wfhub
      POSTGRES_PASSWORD: ""
      POSTGRES_DB: agentic
    ports:
      - "5433:5432"
    volumes:
      - agent_memory_pgdata:/var/lib/postgresql/data
      - ../scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wfhub -d agentic"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  agent_memory_pgdata:
